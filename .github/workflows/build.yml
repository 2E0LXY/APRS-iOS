name: Build APRS Net iOS

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ── Simulator build (always runs) ─────────────────────────────────────────────
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project APRSNet.xcodeproj \
            -scheme APRSNet \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

  # ── Simulator release artifact (on tags) ──────────────────────────────────────
  release-simulator:
    needs: build
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build and package simulator app
        run: |
          xcodebuild \
            -project APRSNet.xcodeproj \
            -scheme APRSNet \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath DerivedData \
            build
          APP=$(find DerivedData -name "APRSNet.app" -type d | head -1)
          if [ -n "$APP" ]; then
            cp -r "$APP" APRSNet.app
            zip -r APRSNet-iOS-Simulator.zip APRSNet.app
          fi

      - name: Upload simulator build to release
        uses: softprops/action-gh-release@v2
        with:
          files: APRSNet-iOS-Simulator.zip
          body: |
            ## APRS Net iOS ${{ github.ref_name }}

            **Simulator build** — for development/testing only.
            Install on a real iPhone via TestFlight once signing is configured.
            See [DISTRIBUTION.md](https://github.com/2E0LXY/APRS-iOS/blob/main/DISTRIBUTION.md).
          generate_release_notes: true

  # ── TestFlight upload (only runs when APPLE_CERTIFICATE secret is set) ─────────
  #
  # Activate by adding these secrets to the repository:
  #   APPLE_CERTIFICATE          - base64 .p12  (openssl base64 -in cert.p12)
  #   APPLE_CERTIFICATE_PASSWORD - .p12 password
  #   APPLE_PROVISIONING_PROFILE - base64 .mobileprovision
  #   APPLE_TEAM_ID              - 10-char team ID (e.g. ABC12345DE)
  #   ASC_API_KEY_ID             - App Store Connect API key ID
  #   ASC_API_ISSUER_ID          - App Store Connect issuer ID
  #   ASC_API_KEY_BASE64         - base64 .p8 private key
  # See DISTRIBUTION.md for full instructions.
  testflight:
    needs: build
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: testflight
    steps:
      - uses: actions/checkout@v4

      - name: Check signing secrets
        id: check-secrets
        env:
          HAS_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
        run: |
          if [ "$HAS_CERT" != "true" ]; then
            echo "APPLE_CERTIFICATE secret not set — skipping TestFlight upload"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install xcodegen
        if: steps.check-secrets.outputs.skip == 'false'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: steps.check-secrets.outputs.skip == 'false'
        run: xcodegen generate --spec project.yml

      - name: Import Distribution Certificate
        if: steps.check-secrets.outputs.skip == 'false'
        env:
          CERTIFICATE_BASE64:   ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/aprs.keychain-db
          security create-keychain -p "$CERTIFICATE_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$CERTIFICATE_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH
          echo "$CERTIFICATE_BASE64" | base64 --decode -o $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$CERTIFICATE_PASSWORD" $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        if: steps.check-secrets.outputs.skip == 'false'
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          PP=$RUNNER_TEMP/APRSNet_AppStore.mobileprovision
          echo "$PROFILE_BASE64" | base64 --decode -o $PP
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i $PP | plutil -extract UUID raw -)
          cp $PP ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Patch project.yml for App Store signing
        if: steps.check-secrets.outputs.skip == 'false'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          python3 << 'PY'
          import re, os
          with open("project.yml") as f: s = f.read()
          s = s.replace('CODE_SIGN_IDENTITY: ""', 'CODE_SIGN_IDENTITY: "Apple Distribution"')
          s = s.replace('CODE_SIGNING_REQUIRED: "NO"', 'CODE_SIGNING_REQUIRED: "YES"')
          s = s.replace('CODE_SIGNING_ALLOWED: "NO"', 'CODE_SIGNING_ALLOWED: "YES"')
          team = os.environ["APPLE_TEAM_ID"]
          s = s.replace('IPHONEOS_DEPLOYMENT_TARGET: "17.0"',
            f'IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        DEVELOPMENT_TEAM: {team}')
          with open("project.yml","w") as f: f.write(s)
          PY
          xcodegen generate --spec project.yml

      - name: Archive
        if: steps.check-secrets.outputs.skip == 'false'
        run: |
          xcodebuild archive \
            -project APRSNet.xcodeproj \
            -scheme APRSNet \
            -configuration Release \
            -archivePath $RUNNER_TEMP/APRSNet.xcarchive \
            -destination "generic/platform=iOS"

      - name: Export IPA
        if: steps.check-secrets.outputs.skip == 'false'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed "s/\$(APPLE_TEAM_ID)/$APPLE_TEAM_ID/" ExportOptions.plist > /tmp/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/APRSNet.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to TestFlight
        if: steps.check-secrets.outputs.skip == 'false'
        env:
          ASC_API_KEY_ID:     ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID:  ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_BASE64" | base64 --decode \
            -o ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8
          IPA=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)
          xcrun altool --upload-app \
            --type ios --file "$IPA" \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID" \
            --show-progress
          echo "Uploaded to TestFlight successfully"
