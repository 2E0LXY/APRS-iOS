name: Build APRS Net iOS

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml
      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project APRSNet.xcodeproj \
            -scheme APRSNet \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

  release-simulator:
    needs: build
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml
      - name: Build and package
        run: |
          xcodebuild \
            -project APRSNet.xcodeproj \
            -scheme APRSNet \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath DerivedData \
            build
          APP=$(find DerivedData -name "APRSNet.app" -type d | head -1)
          if [ -n "$APP" ]; then
            cp -r "$APP" APRSNet.app
            zip -r APRSNet-iOS-Simulator.zip APRSNet.app
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: APRSNet-iOS-Simulator.zip
          body: |
            ## APRS Net iOS ${{ github.ref_name }}
            Simulator build. See [DISTRIBUTION.md](https://github.com/2E0LXY/APRS-iOS/blob/main/DISTRIBUTION.md) for TestFlight setup.
          generate_release_notes: true

  testflight:
    needs: build
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Check for signing secrets
        id: secrets
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -z "$CERT" ]; then
            echo "No APPLE_CERTIFICATE secret — skipping TestFlight upload"
            echo "enabled=false" >> $GITHUB_OUTPUT
          else
            echo "enabled=true" >> $GITHUB_OUTPUT
          fi
      - name: Install xcodegen
        if: steps.secrets.outputs.enabled == 'true'
        run: brew install xcodegen
      - name: Generate Xcode project
        if: steps.secrets.outputs.enabled == 'true'
        run: xcodegen generate --spec project.yml
      - name: Import certificate
        if: steps.secrets.outputs.enabled == 'true'
        env:
          CERT_B64: ${{ secrets.APPLE_CERTIFICATE }}
          CERT_PASS: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KP=$RUNNER_TEMP/aprs.keychain-db
          security create-keychain -p "$CERT_PASS" $KP
          security set-keychain-settings -lut 21600 $KP
          security unlock-keychain -p "$CERT_PASS" $KP
          security list-keychains -d user -s $KP
          echo "$CERT_B64" | base64 --decode -o $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$CERT_PASS" -A -t cert -f pkcs12 -k $KP
          security set-key-partition-list -S apple-tool:,apple: -s -k "$CERT_PASS" $KP
      - name: Install provisioning profile
        if: steps.secrets.outputs.enabled == 'true'
        env:
          PP_B64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          PP=$RUNNER_TEMP/profile.mobileprovision
          echo "$PP_B64" | base64 --decode -o $PP
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i $PP | plutil -extract UUID raw -)
          cp $PP ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
      - name: Patch signing settings
        if: steps.secrets.outputs.enabled == 'true'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i '' \
            -e 's/CODE_SIGN_IDENTITY: ""/CODE_SIGN_IDENTITY: "Apple Distribution"/' \
            -e 's/CODE_SIGNING_REQUIRED: "NO"/CODE_SIGNING_REQUIRED: "YES"/' \
            -e 's/CODE_SIGNING_ALLOWED: "NO"/CODE_SIGNING_ALLOWED: "YES"/' \
            project.yml
          echo "        DEVELOPMENT_TEAM: $TEAM_ID" >> project.yml
          xcodegen generate --spec project.yml
      - name: Archive
        if: steps.secrets.outputs.enabled == 'true'
        run: |
          xcodebuild archive \
            -project APRSNet.xcodeproj \
            -scheme APRSNet \
            -configuration Release \
            -archivePath $RUNNER_TEMP/APRSNet.xcarchive \
            -destination "generic/platform=iOS"
      - name: Export IPA
        if: steps.secrets.outputs.enabled == 'true'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed "s/\$(APPLE_TEAM_ID)/$TEAM_ID/" ExportOptions.plist > /tmp/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/APRSNet.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export
      - name: Upload to TestFlight
        if: steps.secrets.outputs.enabled == 'true'
        env:
          KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ISSUER: ${{ secrets.ASC_API_ISSUER_ID }}
          KEY_B64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$KEY_B64" | base64 --decode -o ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          IPA=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)
          xcrun altool --upload-app --type ios --file "$IPA" \
            --apiKey "$KEY_ID" --apiIssuer "$ISSUER" --show-progress
