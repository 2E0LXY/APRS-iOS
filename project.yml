name: APRSNet
options:
  bundleIdPrefix: uk.aprsnet
  deploymentTarget:
    iOS: "17.0"
targets:
  APRSNet:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    info:
      properties:
        CFBundleDisplayName: APRS Net
        NSLocationWhenInUseUsageDescription: "Location is used for GPS position beaconing and finding nearby stations."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Background location allows continuous APRS beaconing."
        UIBackgroundModes:
          - location
          - fetch
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: uk.aprsnet.ios
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
schemes:
  APRSNet:
    build:
      targets:
        APRSNet: all
    run:
      config: Debug
    archive:
      config: Release
